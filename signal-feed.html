<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Signal Feed — Renderer · Kitaknows.co</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap');

:root {
  --ink:#0a0a0f; --paper:#f5f2eb; --red:#c8302a;
  --yellow:#e8c64a; --green:#2a6e4e; --dim:#9b9087;
  --rule:#d4cfc6; --highlight:#fff3b0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper);font-family:'DM Sans',sans-serif;color:var(--ink);}

/* ── TOOLBAR ── */
.toolbar{
  position:sticky;top:0;z-index:100;
  background:var(--ink);border-bottom:3px solid var(--yellow);
  padding:10px 32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.toolbar-brand{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--yellow);flex:1;min-width:120px;}
.tb-btn{
  background:transparent;border:1px solid #444;color:#ccc;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;padding:6px 14px;cursor:pointer;border-radius:2px;
  white-space:nowrap;transition:all .15s;
}
.tb-btn:hover{border-color:var(--yellow);color:var(--yellow);}
.tb-btn.primary{background:var(--yellow);border-color:var(--yellow);color:var(--ink);font-weight:500;}
.tb-btn.primary:hover{opacity:.88;}
.tb-btn:disabled{opacity:.35;cursor:default;}
.tb-status{font-family:'DM Mono',monospace;font-size:10px;color:var(--yellow);letter-spacing:.06em;}
.tb-status.err{color:#e87070;}

/* ── PASTE PANEL ── */
.paste-panel{max-width:860px;margin:0 auto;padding:36px 40px 48px;}
.paste-logo{font-family:'Bebas Neue',sans-serif;font-size:72px;line-height:.88;margin-bottom:4px;}
.paste-byline{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--dim);margin-bottom:20px;}

/* Recipients */
.recip-panel{border:1px solid var(--rule);border-radius:3px;background:#fff;
  padding:14px 16px;margin-bottom:14px;}
.recip-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--dim);margin-bottom:10px;}
.recip-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.recip-chip{
  display:flex;align-items:center;gap:6px;
  background:var(--paper);border:1px solid var(--rule);
  border-radius:2px;padding:4px 10px;
  font-family:'DM Mono',monospace;font-size:10px;
}
.recip-chip button{background:none;border:none;cursor:pointer;color:var(--dim);font-size:13px;line-height:1;}
.recip-chip button:hover{color:var(--red);}
.add-row{display:flex;gap:8px;}
.add-input{
  font-family:'DM Mono',monospace;font-size:11px;
  border:1px solid var(--rule);border-radius:2px;
  padding:7px 10px;background:var(--paper);color:var(--ink);outline:none;
}
.add-input:focus{border-color:var(--ink);}

/* Paste area */
.paste-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
.paste-area{
  flex:1;font-family:'DM Mono',monospace;font-size:11px;
  border:1.5px solid var(--rule);border-radius:3px;
  padding:12px;background:#fff;color:var(--ink);
  resize:vertical;min-height:90px;outline:none;transition:border-color .2s;
}
.paste-area:focus{border-color:var(--ink);}
.paste-area::placeholder{color:var(--dim);}
.render-btn{
  background:var(--ink);color:var(--paper);border:none;
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;
  text-transform:uppercase;padding:12px 20px;cursor:pointer;
  border-radius:2px;white-space:nowrap;
}
.render-btn:hover{opacity:.82;}
.parse-err{color:var(--red);font-family:'DM Mono',monospace;font-size:10px;}

/* ── NEWSLETTER ── */
.newsletter{max-width:860px;margin:0 auto;padding:0 40px 60px;}

/* Masthead */
.masthead{border-bottom:4px double var(--ink);padding:28px 0 18px;}
.mast-flag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--red);margin-bottom:4px;}
.mast-row{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;}
.mast-title{font-family:'Bebas Neue',sans-serif;font-size:88px;line-height:.85;color:var(--ink);}
.mast-meta{text-align:right;font-family:'DM Mono',monospace;font-size:9px;
  color:var(--dim);letter-spacing:.08em;line-height:1.9;}
.mast-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--dim);margin-top:6px;}
.mast-bar{
  display:flex;justify-content:space-between;align-items:center;
  border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);
  padding:6px 0;margin-top:12px;
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--dim);flex-wrap:wrap;gap:6px;
}

/* Section label */
.sec-label{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--dim);
  border-top:1px solid var(--rule);padding-top:8px;margin:24px 0 14px;
}

/* Lede */
.lede{border:1.5px solid var(--ink);}
.lede-top{padding:22px 24px;border-bottom:1.5px solid var(--ink);}
.lede-kicker{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--red);margin-bottom:6px;}
.lede-headline{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;margin-bottom:12px;}
.lede-body{font-size:13px;line-height:1.72;color:#222;}
.lede-stats{display:grid;}
.lede-stat{padding:14px 16px;border-right:1px solid var(--rule);}
.lede-stat:last-child{border-right:none;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;margin-bottom:2px;}
.stat-label{font-size:11px;color:var(--dim);line-height:1.4;margin-bottom:3px;}
.stat-src{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim);}
.stat-src a{color:var(--dim);}

/* Deals */
.deal{border-bottom:1px solid var(--rule);padding:18px 0;}
.deal:last-child{border-bottom:none;}
.deal-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.deal-co{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;}
.deal-badge{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;
  text-transform:uppercase;padding:3px 8px;border:1px solid currentColor;}
.badge-ma{color:#534AB7;} .badge-vc{color:var(--green);}
.deal-amt{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-bottom:8px;}
.deal-desc{font-size:13px;line-height:1.65;color:#222;margin-bottom:6px;}
.deal-meta{font-size:12px;line-height:1.6;background:var(--highlight);
  padding:8px 10px;border-left:2px solid var(--yellow);margin-bottom:6px;}
.deal-src{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);}
.deal-src a{color:var(--dim);}

/* Banking */
.banking-grid{display:grid;border:1.5px solid var(--ink);}
.bank-card{padding:18px 20px;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);}
.bank-name{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;margin-bottom:2px;}
.bank-role{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--red);margin-bottom:8px;}
.bank-deals{font-size:12px;line-height:1.6;color:#222;margin-bottom:8px;}
.bank-note{font-size:12px;line-height:1.6;border-left:2px solid var(--ink);
  padding-left:8px;color:var(--dim);margin-bottom:6px;}
.bank-src{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim);}
.bank-src a{color:var(--dim);}

/* Intelligence */
.intel{border-bottom:1px solid var(--rule);padding:18px 0;}
.intel:last-child{border-bottom:none;}
.intel-title{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1.05;margin-bottom:8px;}
.intel-body{font-size:13px;line-height:1.72;color:#222;margin-bottom:6px;}
.intel-src{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);}
.intel-src a{color:var(--dim);}

/* The Take */
.take{background:var(--ink);color:var(--paper);padding:24px;}
.take-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--dim);margin-bottom:8px;}
.take-body{font-size:14px;line-height:1.72;}

/* Radar */
.radar-row{display:grid;grid-template-columns:200px 1fr 120px;
  gap:0;border-bottom:1px solid var(--rule);padding:14px 0;}
.radar-row:last-child{border-bottom:none;}
.radar-co{font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1;margin-bottom:2px;}
.radar-founded{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim);}
.radar-pos{font-size:12px;line-height:1.6;color:#222;margin-bottom:4px;}
.radar-diff{font-size:11px;line-height:1.55;color:var(--dim);
  border-left:2px solid var(--rule);padding-left:8px;}
.radar-right{text-align:right;}
.radar-stage{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-bottom:4px;}
.mom{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;}
.mom-up{color:var(--green);} .mom-watch{color:#7a6e00;} .mom-new{color:#185FA5;}

/* Next Wave */
.nw-grid{display:grid;border:1.5px solid var(--ink);}
.nw-card{padding:18px 16px;border-right:1px solid var(--rule);}
.nw-card:last-child{border-right:none;}
.nw-cat{font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1.05;margin-bottom:4px;}
.nw-stage{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--dim);margin-bottom:8px;}
.nw-pitch{font-size:12px;line-height:1.65;color:#222;margin-bottom:8px;}
.nw-sigs{list-style:none;padding:0;}
.nw-sigs li{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);
  padding:3px 0;border-top:1px solid var(--rule);}
.nw-sigs li:first-child{border-top:none;}
.nw-src{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim);margin-top:8px;}
.nw-src a{color:var(--dim);}

/* Memory */
.mem-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.mem-chip{font-family:'DM Mono',monospace;font-size:9px;
  background:var(--paper);border:1px solid var(--rule);
  border-radius:2px;padding:3px 9px;color:var(--dim);}

/* Footer */
.nl-footer{
  border-top:3px solid var(--ink);margin-top:28px;padding-top:14px;
  display:flex;justify-content:space-between;align-items:center;
  font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);flex-wrap:wrap;gap:6px;
}
.footer-brand{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--ink);}

@media print{
  .toolbar,.paste-panel{display:none!important;}
  .newsletter{padding:0;}
}
@media(max-width:640px){
  .paste-panel,.newsletter{padding-left:16px;padding-right:16px;}
  .mast-title{font-size:60px;}
  .radar-row{grid-template-columns:1fr;}
  .radar-right{text-align:left;}
}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar" id="toolbar">
  <div class="toolbar-brand">The Signal Feed &middot; Kitaknows.co</div>
  <button class="tb-btn" id="btn-back" onclick="showPaste()" style="display:none">&#8592; New Issue</button>
  <button class="tb-btn primary" id="btn-send" onclick="sendEmail()" style="display:none" disabled>Send</button>
  <button class="tb-btn" id="btn-print" onclick="window.print()" style="display:none">Print / PDF</button>
  <button class="tb-btn" id="btn-copy" onclick="copyHTML()" style="display:none">Copy HTML</button>
  <span class="tb-status" id="tb-status"></span>
</div>

<!-- PASTE PANEL -->
<div class="paste-panel" id="paste-panel">
  <div class="paste-logo">THE<br>SIGNAL<br>FEED</div>
  <div class="paste-byline">Weekly Issue Renderer &middot; Kitaknows.co</div>

  <!-- RECIPIENTS -->
  <div class="recip-panel">
    <div class="recip-label">Recipients</div>
    <div class="recip-chips" id="recip-chips"></div>
    <div class="add-row">
      <input class="add-input" id="add-name" placeholder="Name" style="width:130px"/>
      <input class="add-input" id="add-email" placeholder="email@domain.com" style="flex:1"
        onkeydown="if(event.key==='Enter')addRecipient()"/>
      <button class="render-btn" onclick="addRecipient()" style="padding:7px 14px;font-size:10px;">+ Add</button>
    </div>
  </div>

  <!-- PASTE -->
  <div class="paste-row">
    <textarea class="paste-area" id="json-in" placeholder="Paste Claude's JSON output here, then click Render"></textarea>
    <button class="render-btn" onclick="renderFeed()">Render</button>
  </div>
  <div class="parse-err" id="parse-err"></div>
</div>

<!-- NEWSLETTER OUTPUT -->
<div class="newsletter" id="newsletter" style="display:none"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
var EJ_SVC  = "service_iknjsua";
var EJ_TPL  = "template_d7lydfw";
var EJ_KEY  = "HDpCzioEz8im6AH1E";
var STORE_KEY = "sf-recipients";

var currentData = null;
var recipients  = [];

// ── BOOT ────────────────────────────────────────────────────────────────────
(function init(){
  emailjs.init(EJ_KEY);
  try {
    var saved = localStorage.getItem(STORE_KEY);
    if (saved) recipients = JSON.parse(saved);
  } catch(e){}
  renderChips();
})();

// ── RECIPIENTS ──────────────────────────────────────────────────────────────
function saveRecipients(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(recipients)); }catch(e){} }

function renderChips(){
  var el = document.getElementById("recip-chips");
  el.innerHTML = recipients.map(function(r,i){
    return '<div class="recip-chip"><span>'+esc(r.name)+' &lt;'+esc(r.email)+'&gt;</span>'
      +'<button onclick="removeRecipient('+i+')">&times;</button></div>';
  }).join("");
  updateSendBtn();
}

function addRecipient(){
  var email = document.getElementById("add-email").value.trim();
  var name  = document.getElementById("add-name").value.trim() || email.split("@")[0];
  if (!email.includes("@")) return;
  recipients.push({name:name, email:email});
  saveRecipients();
  document.getElementById("add-email").value = "";
  document.getElementById("add-name").value  = "";
  renderChips();
}

function removeRecipient(i){
  recipients.splice(i,1);
  saveRecipients();
  renderChips();
}

function updateSendBtn(){
  var btn = document.getElementById("btn-send");
  if (!btn) return;
  btn.disabled = (recipients.length === 0 || !currentData);
  btn.textContent = recipients.length > 0
    ? "Send to " + recipients.length + " recipient" + (recipients.length>1?"s":"")
    : "Add Recipients";
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function renderFeed(){
  var raw = document.getElementById("json-in").value.trim();
  document.getElementById("parse-err").textContent = "";
  if (!raw){ document.getElementById("parse-err").textContent = "Paste JSON first."; return; }
  var d;
  try { d = JSON.parse(raw); } catch(e){
    document.getElementById("parse-err").textContent = "Invalid JSON: " + e.message; return;
  }
  currentData = d;
  document.getElementById("newsletter").innerHTML = buildHTML(d);
  document.getElementById("paste-panel").style.display = "none";
  document.getElementById("newsletter").style.display  = "block";
  document.getElementById("btn-back").style.display    = "inline-block";
  document.getElementById("btn-send").style.display    = "inline-block";
  document.getElementById("btn-print").style.display   = "inline-block";
  document.getElementById("btn-copy").style.display    = "inline-block";
  updateSendBtn();
  window.scrollTo(0,0);
}

function showPaste(){
  document.getElementById("paste-panel").style.display = "block";
  document.getElementById("newsletter").style.display  = "none";
  document.getElementById("btn-back").style.display    = "none";
  document.getElementById("btn-send").style.display    = "none";
  document.getElementById("btn-print").style.display   = "none";
  document.getElementById("btn-copy").style.display    = "none";
  document.getElementById("tb-status").textContent     = "";
  currentData = null;
  updateSendBtn();
}

// ── BUILD HTML ───────────────────────────────────────────────────────────────
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function src(s,u){ return u ? '<a href="'+esc(u)+'" target="_blank">'+esc(s)+'</a>' : esc(s||""); }
var momClass = {up:"mom-up",watch:"mom-watch",new:"mom-new"};
var momLabel = {up:"&uarr; Up", watch:"&#9689; Watch", new:"&starf; New"};

function buildHTML(d){
  var iss   = d.issue || {};
  var lede  = d.lede  || {};
  var deals = d.deals || [];
  var banks = d.banking || [];
  var intel = d.intelligence || [];
  var radar = d.radar || [];
  var nw    = d.nextWave || [];
  var mem   = d.memoryItems || [];

  // Stats
  var statCols = Math.min((lede.stats||[]).length, 4) || 1;
  var statsHTML = (lede.stats||[]).map(function(s){
    return '<div class="lede-stat"><div class="stat-num">'+esc(s.num)+'</div>'
      +'<div class="stat-label">'+esc(s.label)+'</div>'
      +'<div class="stat-src">'+src(s.source, s.sourceUrl)+'</div></div>';
  }).join("");

  // Deals
  var dealsHTML = deals.map(function(d){
    return '<div class="deal">'
      +'<div class="deal-top"><div class="deal-co">'+esc(d.company)+'</div>'
      +'<span class="deal-badge badge-'+esc(d.type)+'">'+esc((d.type||"").toUpperCase())+'</span></div>'
      +'<div class="deal-amt">'+esc(d.amount)+'</div>'
      +'<div class="deal-desc">'+esc(d.description)+'</div>'
      +(d.meta ? '<div class="deal-meta">'+esc(d.meta)+'</div>' : '')
      +'<div class="deal-src">'+src(d.source, d.sourceUrl)+'</div>'
      +'</div>';
  }).join("");

  // Banking
  var bankCols = Math.min(banks.length, 2) || 1;
  var banksHTML = banks.map(function(b){
    return '<div class="bank-card"><div class="bank-name">'+esc(b.bank)+'</div>'
      +'<div class="bank-role">'+esc(b.role)+'</div>'
      +'<div class="bank-deals">'+esc(b.deals)+'</div>'
      +(b.note ? '<div class="bank-note">'+esc(b.note)+'</div>' : '')
      +'<div class="bank-src">'+src(b.source, b.sourceUrl)+'</div></div>';
  }).join("");

  // Intelligence
  var intelHTML = intel.map(function(item){
    return '<div class="intel"><div class="intel-title">'+esc(item.title)+'</div>'
      +'<div class="intel-body">'+esc(item.body)+'</div>'
      +'<div class="intel-src">'+src(item.source, item.sourceUrl)+'</div></div>';
  }).join("");

  // Radar
  var radarHTML = radar.map(function(r){
    var mc = momClass[r.momentum] || "mom-watch";
    var ml = momLabel[r.momentum] || esc(r.momentum||"");
    return '<div class="radar-row">'
      +'<div><div class="radar-co">'+esc(r.company)+'</div><div class="radar-founded">'+esc(r.founded)+'</div></div>'
      +'<div><div class="radar-pos">'+esc(r.positioning)+'</div>'
      +(r.differentiator ? '<div class="radar-diff">'+esc(r.differentiator)+'</div>' : '')
      +'</div>'
      +'<div class="radar-right"><div class="radar-stage">'+esc(r.stage)+'</div>'
      +'<div class="mom '+mc+'">'+ml+'</div></div>'
      +'</div>';
  }).join("");

  // Next Wave
  var nwCols  = Math.min(nw.length, 3) || 1;
  var nwHTML  = nw.map(function(n){
    var sigs = (n.signals||[]).map(function(s){ return '<li>'+esc(s)+'</li>'; }).join("");
    return '<div class="nw-card"><div class="nw-cat">'+esc(n.category)+'</div>'
      +'<div class="nw-stage">'+esc(n.stage)+'</div>'
      +'<div class="nw-pitch">'+esc(n.pitch)+'</div>'
      +(sigs ? '<ul class="nw-sigs">'+sigs+'</ul>' : '')
      +'<div class="nw-src">'+src(n.source, n.sourceUrl)+'</div></div>';
  }).join("");

  // Memory
  var memHTML = mem.map(function(m){
    return '<span class="mem-chip">'+esc(m.company)+'</span>';
  }).join("");

  // Topics ticker
  var topicsHTML = (iss.coverageTopics||[]).map(function(t){ return '<span>'+esc(t)+'</span>'; }).join("");

  return ''
    // MASTHEAD
    +'<div class="masthead">'
    +'<div class="mast-flag">Weekly Intelligence Brief</div>'
    +'<div class="mast-row">'
    +'<div class="mast-title">THE<br>SIGNAL<br>FEED</div>'
    +'<div class="mast-meta">'+esc(iss.vol||'')+'<br>'+esc(iss.num||'')+'<br>'+esc(iss.week||'')+'</div>'
    +'</div>'
    +'<div class="mast-sub">MDR &amp; AI SOC &mdash; Powered by Kita</div>'
    +(topicsHTML ? '<div class="mast-bar">'+topicsHTML+'</div>' : '')
    +'</div>'

    // LEDE
    +'<div class="sec-label">This Week\'s Thesis</div>'
    +'<div class="lede">'
    +'<div class="lede-top">'
    +'<div class="lede-kicker">'+esc(lede.kicker||'')+'</div>'
    +'<div class="lede-headline">'+esc(lede.headline||'')+'</div>'

// ── EMAIL ────────────────────────────────────────────────────────────────────
function sendEmail(){
  if (!currentData || recipients.length === 0) return;
  var btn = document.getElementById("btn-send");
  var st  = document.getElementById("tb-status");
  btn.disabled = true;
  st.className = "tb-status";
  st.textContent = "Sending...";

  var iss  = currentData.issue || {};
  var subject = "The Signal Feed \u2014 " + (iss.week || iss.num || "Weekly Issue");
  var html = document.getElementById("newsletter").innerHTML;

  var sends = recipients.map(function(r){
    return emailjs.send(EJ_SVC, EJ_TPL, {
      to_name:   r.name,
      to_email:  r.email,
      subject:   subject,
      html_body: html
    });
  });

  Promise.all(sends)
    .then(function(){
      st.textContent = "\u2713 Sent to " + recipients.length + " recipient" + (recipients.length>1?"s":"");
      btn.disabled = false;
    })
    .catch(function(e){
      st.className = "tb-status err";
      st.textContent = "\u2717 " + (e.text || e.message || JSON.stringify(e));
      btn.disabled = false;
    });
}

// ── COPY HTML ────────────────────────────────────────────────────────────────
function copyHTML(){
  var html = document.getElementById("newsletter").innerHTML;
  navigator.clipboard.writeText(html)
    .then(function(){ document.getElementById("tb-status").textContent = "HTML copied!"; })
    .catch(function(){ document.getElementById("tb-status").textContent = "Copy failed \u2014 try manually."; });
}
